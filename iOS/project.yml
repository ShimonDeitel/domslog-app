name: Domslog
options:
  bundleIdPrefix: com.shimondeitel.domslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Domslog:
    type: application
    platform: iOS
    sources:
      - path: Domslog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.domslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Domslog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DomslogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DomslogTests
      - path: Domslog.storekit
    dependencies:
      - target: Domslog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.domslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DomslogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DomslogUITests
    dependencies:
      - target: Domslog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.domslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Domslog:
    build:
      targets:
        Domslog: all
        DomslogTests: [test]
        DomslogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Domslog.storekit
    test:
      config: Debug
      storeKitConfiguration: Domslog.storekit
      targets:
        - DomslogTests
        - DomslogUITests
    archive:
      config: Release
